---

- name: Install privacy packages
  ansible.builtin.dnf:
    name: "{{ privacy_packages }}"
    state: present

# this is needed for checking if certain packages are installed
- name: Gather package facts
  ansible.builtin.package_facts:
    manager: auto

- name: Configure Tor when installed
  when: '"tor" in ansible_facts.packages'
  block:
    - name: Ensure /etc/tor/torrc.d directory exists
      ansible.builtin.file:
        path: /etc/tor/torrc.d
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Copy custom torrc drop-in config
      ansible.builtin.copy:
        src: etc/tor/torrc.d/99-exitnodes-custom.conf
        dest: /etc/tor/torrc.d/99-exitnodes-custom.conf
        owner: root
        group: root
        mode: '0644'
      notify: Restart tor

    - name: Ensure tor service runs on system startup
      ansible.builtin.systemd:
        name: tor
        state: started
        enabled: true

- name: Configure ProxyChains when installed
  when: '"proxychains-ng" in ansible_facts.packages'
  block:
    - name: Copy proxychains config file
      ansible.builtin.copy:
        src: etc/proxychains.conf
        dest: /etc/proxychains.conf
        owner: root
        group: root
        mode: '0644'
        backup: true
